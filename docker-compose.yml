version: '3.9'

services:
  backend:
    build:
      context: ./backend
    container_name: express-server
    ports:
      - "4000:4000"
    networks:
      - fullstack-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: react-frontend
    depends_on:
      - backend
    ports:
      - "5174:3000"
    networks:
      - fullstack-net
    restart: unless-stopped

networks:
  fullstack-net:
    driver: bridge